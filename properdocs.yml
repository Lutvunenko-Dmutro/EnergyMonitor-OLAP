site_name: ⚡ Energy Monitor Ultimate (Project Atlas)
site_description: Інтелектуальна система OLAP-моніторингу та ШІ-прогнозування навантаження енергетичних мереж. Автор - Литвиненко Дмитро Сергійович (Lutvunenko Dmutro), бакалавр 121 ІПЗ.
repo_url: https://github.com/Lutvunenko-Dmutro/EnergyMonitor-OLAP
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: deep orange
    accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - 🏗️ Архітектура:
      - Загальний огляд: system/architecture.md
      - Digital Twin: system/digital_twin.md
      - База даних: system/database.md
      - ML Pipeline: ml/index.md
  - 🗺️ Атлас Проєкту:
      - "🛡️ Defense Atlas (Interactive)": system/atlas_final.md
      - "🗺️ Реєстр Гіга-Паспортів (79 модулів)": system/map/ATLAS_MASTER_INDEX.md
      - "🏙️ CodeCity: 3D-Атлас": system/atlas_city.md
  - 📗 Плани та Статус:
      - План документації: DOCS_PLAN.md
      - План розробки: ROADMAP.md
      - Поточний статус: PROJECT_STATUS.md
  - 🛠️ Інструкції та Безпека:
      - Інструкція користувача: guides/USER_MANUAL.md
      - Звіт з безпеки: guides/SECURITY.md
      - Тестування: guides/TESTING_GUIDE.md
      - Обслуговування: guides/MAINTENANCE.md
  - 📚 Довідка:
      - Референс модулів (API): api/index.md
      - Глосарій: GLOSSARY.md
  - Дипломна робота:
      - План та Календар: thesis/DIPLOMA_PLAN.md
      - Реферат: thesis/THESIS_0_ABSTRACT.md
      - Вступ: thesis/THESIS_0_INTRODUCTION.md
      - Розділ 1. Теорія: thesis/THESIS_1_THEORY.md
      - Розділ 2. Вимоги: thesis/THESIS_2_REQUIREMENTS.md
      - Розділ 3. Реалізація (v3): thesis/THESIS_3_DESIGN_AND_IMPLEMENTATION.md
      - Висновки: thesis/THESIS_FINAL_CONCLUSIONS.md
      - Список літератури: thesis/BIBLIOGRAPHY.md
      - Додатки: thesis/THESIS_APPENDICES.md
      - Канбан проєкту: thesis/KANBAN_THESIS.md
      - Тези та апробація: thesis/THESIS_PROCEEDINGS_ABSTRACTS.md
      - Скорочення: thesis/ABBREVIATIONS.md
      - Шпаргалка до захисту: thesis/DEFENSE_GUIDE.md
      - Презентація диплома: thesis/THESIS_PRESENTATION_FINAL.md
  - 📋 Матеріали практики:
      - Звіт (ФІНАЛ): thesis/PRACTICE_REPORT_FINAL.md
      - Щоденник практики: thesis/PRACTICE_DIARY_DRAFT.md
      - Презентація: thesis/PRACTICE_PRESENTATION_DRAFT.md
      - Повний чернетка звіту: thesis/ARCHIVE/PRACTICE_REPORT_FULL_DRAFT.md
  - 📄 Офіційні бланки:
      - Титульна сторінка: thesis/OFFICIAL_TITLE_PAGE.md
      - Завдання на роботу: thesis/OFFICIAL_TASK_STATEMENT.md
      - Календарний план: thesis/OFFICIAL_CALENDAR_PLAN.md
      - Відгук керівника: thesis/OFFICIAL_REVIEW_PROJECT.md
      - Рецензія: thesis/OFFICIAL_RECENSION_PROJECT.md
  - 🕰️ Архів та Історія:
      - Для рецензента: FOR_REVIEWER.md
      - Що змінено (v3): history/WHATS_CHANGED.md
      - Аудит якості: history/COMPREHENSIVE_CODE_QUALITY_AUDIT.md
      - Звіт про виправлення: history/FIXES_IMPLEMENTED_REPORT.md
      - Фінальний звіт імплементації: history/FINAL_IMPLEMENTATION_REPORT.md
      - Метрики та Дашборд: history/METRICS_AND_DASHBOARD.md
      - Аудит зображень: thesis/IMAGE_AUDIT_REPORT.md
      - Повна збірка (Master): thesis/THESIS_FULL_FINAL_UTF8.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - tables
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - atlas/theme.css
  - atlas/components.css
  - atlas/mermaid.css
  - atlas/blueprint.css
  - https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/vs2015.min.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdnjs.cloudflare.com/ajax/libs/polyfill/3.111.0/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js
  - javascripts/syntax_highlighter.js