site_name: ⚡ Energy Monitor Ultimate
site_description: Інтелектуальна система OLAP-моніторингу та ШІ-прогнозування навантаження енергетичних мереж
repo_url: https://github.com/Lutvunenko-Dmutro/EnergyMonitor-OLAP
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: deep orange
    accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Архітектура: architecture.md
  - ML Pipeline: ml/index.md
  - Digital Twin: digital_twin.md
  - База даних: database.md
  - Тестування: testing.md
  - Дипломна робота: DIPLOMA_PLAN.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          setup_commands:
            - import sys
            - sys.path.append(".")

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - arithmatex:
      generic: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js