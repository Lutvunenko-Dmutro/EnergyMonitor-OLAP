site_name: ⚡ Energy Monitor Ultimate (Project Atlas)
site_description: Інтелектуальна система OLAP-моніторингу та ШІ-прогнозування навантаження енергетичних мереж
repo_url: https://github.com/Lutvunenko-Dmutro/EnergyMonitor-OLAP
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: deep orange
    accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - 🏗️ Архітектура:
      - Загальний огляд: system/architecture.md
      - Digital Twin: system/digital_twin.md
      - База даних: system/database.md
      - ML Pipeline: ml/index.md
  - 🗺️ Атлас Проєкту:
      - 📍 Головна Карта: system/atlas.md
      - ⚙️ Ядро (Core): system/map/core_map.md
      - 🧠 ШІ-Конвеєр (ML): system/map/ml_map.md
      - 🎨 Інтерфейс (UI): system/map/ui_map.md
      - 🏭 Сервіси (Services): system/map/services_map.md
  - 📗 Плани та Статус:
      - План документації: DOCS_PLAN.md
      - План розробки: ROADMAP.md
  - 🛠️ Інструкції та Безпека:
      - Інструкція користувача: guides/USER_MANUAL.md
      - Звіт з безпеки: guides/SECURITY.md
      - Тестування: guides/TESTING_GUIDE.md
      - Обслуговування: guides/MAINTENANCE.md
  - 📚 Довідка:
      - Референс модулів (API): api/index.md
      - Глосарій: GLOSSARY.md
  - Дипломна робота: DIPLOMA_PLAN.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          setup_commands:
            - import sys
            - sys.path.append(".")

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - tables
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js